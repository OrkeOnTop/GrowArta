<!doctype html>
<html lang="lt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Prisijungti</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dark">
  <main class="center-wrap">
    <div class="card login-card" id="login-card">
      <h1>Prisijungti</h1>

      <label class="field">
        <span>Vartotojo vardas</span>
        <input id="login-username" type="text" autocomplete="username" />
      </label>

      <label class="field">
        <span>Slaptažodis</span>
        <input id="login-password" type="password" autocomplete="current-password" />
      </label>

      <div class="row small">
        <a href="#" id="forgot-link">Pamiršote slaptažodį?</a>
      </div>

      <div class="captcha-row">
        <label class="checkbox-inline">
          <input id="human-check" type="checkbox" />
          <span>Aš esu žmogus</span>
        </label>
        <div class="hcaptcha-note">hCaptcha <span class="muted">Privatumas - Sąlygos</span></div>
      </div>

      <button id="btn-login" class="primary">Prisijungti</button>

      <div class="divider">arba</div>

      <div class="signup">
        Dar neturite paskyros? <a id="to-register" href="register.html#register">Sukurkite čia!</a>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
